---
layout: default
---

<div class="row g-5 mb-5">
  <div>
    <h3 class="fw-bold">{{ page.title }}</h3>
    <p class="border-bottom pb-3 mb-5">&#x1F4C1; <a href="{{ site.github.url }}{{ page.folderpath }}">{{ page.folder }}</a>&ensp;|&ensp;{{ page.date | date: "%B %-d, %Y" }}</p>
    <div class="row g-5 mb-5">
      <div class="col-md-12">
        {{ content }}
      </div>
    </div>
  </div>
</div>
