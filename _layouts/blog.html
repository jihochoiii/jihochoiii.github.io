---
layout: default
---

{{ content }}

<div class="row g-5 mb-5">
  <div>
    <h3 class="fw-bold border-bottom pb-3 mb-5">Blog</h3>
    <div class="row g-5 mb-4">
      <div class="col-md-12">
        {% for post in site.posts %}
          <h5><a href="{{ site.github.url }}{{ post.url }}">{{ post.title }}</a> - {{ post.date | date: "%B %-d, %Y" }}</h5>
          <p><small>{{ post.preview }} ...</small><br>&nbsp;</p>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
