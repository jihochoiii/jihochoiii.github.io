---
layout: default
---

{{ content }}

<div class="row g-5 mb-5">
  <div>
    <h3 class="fw-bold border-bottom pb-3 mb-5">CV</h3>
    <div class="row g-5 mb-5">
      <div class="col-md-2">
        <h4>Education</h4>
      </div>
      <div class="col-md-10">
        {% for section in site.data.cv.education %}
          <p class="fw-bold">{{ section.title }}</p>
          <p><span class="bolded">{{ section.institution }}</span>, <em>{{ section.details }}</em></p>
          <p>&nbsp;</p>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
