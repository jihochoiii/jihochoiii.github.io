---
layout: default
---

{{ content }}

<div class="row g-5 mb-5">
  <div>
    <h3 class="fw-bold border-bottom pb-3 mb-5">CV</h3>
    <div class="row g-5 mb-5">
      <div class="col-md-2">
        <h4>Education</h4>
      </div>
      <div class="col-md-10">
        {% for section in site.data.cv.education %}
          <p style="line-height: 1.5;"><b>{{ section.title }}</b></p>
          <p style="line-height: 2.0;"><b>{{ section.institution }}</b>, <em>{{ section.details }}</em></p>
        {% endfor %}
      </div>
    </div>
  </div>
</div>
