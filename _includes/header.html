<header class="d-flex flex-column flex-md-row align-items-center pb-3 mb-5 border-bottom">
  <div>
    <a href="{{ site.github.url }}/" class="d-flex align-items-center text-decoration-none">
      <span class="fs-4 fw-bold">{{ site.title }}</span>
    </a>
    <a href="{{ site.github.url }}/" class="d-flex align-items-center text-decoration-none">
      <span>{{ site.description }}</span>
    </a>
  </div>
  <nav class="d-inline-flex mt-2 mt-md-0 ms-md-auto">
    <ul>
      <li><a class="me-3 py-2 text-decoration-none" href="{{ site.github.url }}/blog">blog</a></li>
      <li><a class="me-3 py-2 text-decoration-none" href="{{ site.github.url }}/projects">projects</a></li>
      <li><a class="me-3 py-2 text-decoration-none" href="{{ site.github.url }}/publications">publications</a></li>
      <li><a class="me-3 py-2 text-decoration-none" href="{{ site.github.url }}/cv">cv</a></li>
      <li><a class="me-3 py-2 text-decoration-none" href="{{ site.github.url }}/contact">contact</a></li>
    </ul>
<!--     {% for item in site.data.settings.menu %}
      <a class="me-3 py-2 text-decoration-none" href="{{ site.github.url }}{{ item.url }}">{{ item.name }}</a>
    {% endfor %} -->
  </nav>
</header>
